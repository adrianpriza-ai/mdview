name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o mdview .

      - name: Vet
        run: go vet ./...
      
      - name: Format check
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Code is not formatted. Run: gofmt -s -w ."
            exit 1
          fi
